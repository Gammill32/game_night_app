{% extends "auth_base.html" %}
{% block title %}Update Password — Game Night{% endblock %}
{% block content %}
<h2 class="text-xl font-bold text-stone-800 mb-6">Update password</h2>
<form method="POST" class="space-y-4">
  <div>
    <label for="current_password" class="block text-sm font-medium text-stone-700 mb-1">Current password</label>
    <input type="password" id="current_password" name="current_password" required
           class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
  </div>
  <div>
    <label for="new_password" class="block text-sm font-medium text-stone-700 mb-1">New password</label>
    <input type="password" id="new_password" name="new_password" required
           class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
  </div>
  <div>
    <label for="confirm_password" class="block text-sm font-medium text-stone-700 mb-1">Confirm new password</label>
    <input type="password" id="confirm_password" name="confirm_password" required
           class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
  </div>
  <button type="submit" class="w-full rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition-colors">
    Update password
  </button>
</form>
{% endblock %}
