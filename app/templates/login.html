{% extends "auth_base.html" %}
{% block title %}Login — Game Night{% endblock %}
{% block content %}
<h2 class="text-xl font-bold text-stone-800 mb-6">Sign in</h2>
<form method="POST" class="space-y-4">
  <div>
    <label for="email" class="block text-sm font-medium text-stone-700 mb-1">Email</label>
    <input type="email" id="email" name="email" required
           class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
  </div>
  <div>
    <label for="password" class="block text-sm font-medium text-stone-700 mb-1">Password</label>
    <input type="password" id="password" name="password" required
           class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
  </div>
  <button type="submit" class="w-full rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition-colors">
    Sign in
  </button>
</form>
<div class="mt-4 flex justify-between text-sm">
  <a href="{{ url_for('auth.signup') }}" class="text-red-600 hover:text-red-700 underline">Create account</a>
  <a href="{{ url_for('auth.forgot_password') }}" class="text-red-600 hover:text-red-700 underline">Forgot password?</a>
</div>
{% endblock %}
