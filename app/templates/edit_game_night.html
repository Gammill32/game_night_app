{% extends "base.html" %}

{% block title %}Edit Game Night{% endblock %}

{% block content %}
<h1>Edit Game Night</h1>

<!-- Edit Form -->
<form action="{{ url_for('game_night.edit_game_night', game_night_id=game_night.id) }}" method="POST">
  <div class="form-group">
    <label for="date">Date:</label>
    <input
      type="date"
      name="date"
      id="date"
      class="form-control"
      value="{{ game_night.date.strftime('%Y-%m-%d') }}"
      required
    />
  </div>

  <div class="form-group">
    <label for="notes">Notes:</label>
    <textarea
      name="notes"
      id="notes"
      rows="4"
      class="form-control"
    >{{ game_night.notes }}</textarea>
  </div>

  <div class="attendee-form-section">
    <h3>Attendees:</h3>
    {% if people %}
      <div class="attendees-container">
        {% for person in people %}
          <label class="attendee__label{% if person.id in current_attendees %} attendee__label--selected{% endif %}">
            <input
              type="checkbox"
              name="attendees"
              value="{{ person.id }}"
              class="attendee__checkbox"
              {% if person.id in current_attendees %}checked{% endif %}
            />
            {{ person.first_name }} {{ person.last_name }}
          </label>
        {% endfor %}
      </div>
    {% else %}
      <p>
        No people found.
        <a href="{{ url_for('admin.add_person') }}">Add a person</a>
      </p>
    {% endif %}
  </div>

  <button type="submit" class="btn btn--success">Save Changes</button>
</form>

<!-- Delete Form -->
<form
  action="{{ url_for('game_night.delete_game_night', game_night_id=game_night.id) }}"
  method="POST"
  onsubmit="return confirm('Are you sure you want to delete this game night? This cannot be undone.');"
  class="form-inline"
>
  <button type="submit" class="btn btn--danger">Delete Game Night</button>
</form>

<!-- Back Link -->
<div class="admin-panel__back-home">
  <a href="{{ url_for('game_night.view_game_night', game_night_id=game_night.id) }}" class="btn btn--primary">Back to Game Night</a>
</div>
{% endblock %}
