{% extends "auth_base.html" %}
{% block title %}Sign Up — Game Night{% endblock %}
{% block content %}
<h2 class="text-xl font-bold text-stone-800 mb-6">Create account</h2>
<form method="POST" class="space-y-4">
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label for="first_name" class="block text-sm font-medium text-stone-700 mb-1">First name</label>
      <input type="text" id="first_name" name="first_name" required
             class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
    </div>
    <div>
      <label for="last_name" class="block text-sm font-medium text-stone-700 mb-1">Last name</label>
      <input type="text" id="last_name" name="last_name" required
             class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
    </div>
  </div>
  <div>
    <label for="email" class="block text-sm font-medium text-stone-700 mb-1">Email</label>
    <input type="email" id="email" name="email" required
           class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
  </div>
  <div>
    <label for="password" class="block text-sm font-medium text-stone-700 mb-1">Password</label>
    <input type="password" id="password" name="password" required
           class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent" />
  </div>
  <button type="submit" class="w-full rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition-colors">
    Create account
  </button>
</form>
<p class="mt-4 text-center text-sm">
  <a href="{{ url_for('auth.login') }}" class="text-red-600 hover:text-red-700 underline">Back to sign in</a>
</p>
{% endblock %}
