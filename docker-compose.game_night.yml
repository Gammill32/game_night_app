services:

  postgres:
    image: postgres:16
    container_name: game_night_postgres
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - /home/sgammill/projects/game_night_app/postgres_data:/var/lib/postgresql/data
      - /home/sgammill/projects/game_night_app/init_db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - web_network

  game_night_app:
    build: .
    container_name: game_night_app
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - FLASK_DEBUG
      - SECRET_KEY
      - DATABASE_URL
      - PGHOST
      - PGPORT
      - MAIL_SERVER
      - MAIL_PORT
      - MAIL_USE_TLS
      - MAIL_USE_SSL
      - MAIL_USERNAME
      - MAIL_PASSWORD
      - MAIL_DEFAULT_SENDER
      - FLASK_APP
      - BGG_API_TOKEN
    restart: always
    volumes:
      - /home/sgammill/projects/game_night_app/app/templates:/app/templates
      - /home/sgammill/projects/game_night_app/app/static:/app/static
    networks:
      - web_network
    labels:
      - "traefik.enable=true"

      # Router for game night app
      - "traefik.http.routers.game_night.rule=Host(`gamenight.sgammill.com`)"
      - "traefik.http.routers.game_night.entrypoints=websecure"
      - "traefik.http.routers.game_night.tls.certresolver=cloudflare"

      # Service config
      - "traefik.http.services.game_night.loadbalancer.server.port=8000"

networks:
  web_network:
    external: true